server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/foodapp
    username: foodapp
    password: food123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update   # Creates tables if not exist, keeps old data
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: true   # Changed from false to true to fix LazyInitializationException

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: food-app-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com   # Replace with your real Gmail
    password: your_app_password      # Replace with Gmail App Password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.springframework.kafka: INFO
server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/foodapp
    username: foodapp
    password: food123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create   # 🔥 change from update → create (fix FK issue)
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: food-app-group

  mail:
    host: smtp.gmail.com
    port: 587
    username: YOUR_EMAIL@gmail.com
    password: YOUR_APP_PASSWORD  # ⚠️ Use App Password for Gmail
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true